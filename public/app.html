<!DOCTYPE html>
<html>

<head>
    <title>Hardware Inventory</title>
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="/app-tab-mob.css">
    <link rel="stylesheet" href="/pages/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>

<body>

    <!-- TOP NAVBAR -->
    <header class="topbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="menuBtn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h2 data-page="dashboard" onclick="navigate('dashboard', this)">🔧 Vinaro Inventory</h2>
        </div>

        <button class="logoutBtn" onclick="logout()">Logout</button>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <button data-page="dashboard" onclick="navigate('dashboard', this)">
            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>
        </button>

        <button data-page="inventory" onclick="navigate('inventory', this)">
            <i class="fa-solid fa-boxes-stacked"></i>
            <span>Inventory</span>
        </button>

        <button data-page="borrow" onclick="navigate('borrow', this)">
            <i class="fa-solid fa-hand-holding"></i>
            <span>Borrow</span>
        </button>

        <button data-page="logs" onclick="navigate('logs', this)">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Logs</span>
        </button>
    </aside>

    <!-- CONTENT -->
    <main class="content">
        <div id="appContent"></div>
    </main>

    <script src="/app.js"></script>
</body>

</html>
