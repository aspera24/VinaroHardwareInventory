<!DOCTYPE html>
<html>

<head>
    <title id="browser-title"></title>
    <link rel="icon" href="/graphics/vhiLogo.png">
    <!-- Main page style -->
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="/app-tab-mob.css">

    <!-- Sub-pages styles -->
    <link rel="stylesheet" href="/pages/css/dashboard.css">
    <link rel="stylesheet" href="/pages/css/inventory.css">
    <link rel="stylesheet" href="/pages/css/borrow.css">
    <link rel="stylesheet" href="/pages/css/logs.css">

    <!-- For icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- // For Datatable -->
    <!-- <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"> -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- For Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- TOP NAVBAR -->
    <header class="topbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <a class="menuBtn" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </a>
            <img src="/graphics/vhiLogo.png" alt="">
            <a data-page="dashboard" onclick="navigate('dashboard', this)" id="logoLink">
                BorrowTrack
            </a>
        </div>
        <p id="adminName"></p>
        <a class="logoutBtn" onclick="logout()">Logout</a>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a data-page="dashboard" onclick="navigate('dashboard', this)">
            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>
        </a>

        <a data-page="inventory" onclick="navigate('inventory', this)">
            <i class="fa-solid fa-boxes-stacked"></i>
            <span>Inventory</span>
        </a>

        <a data-page="borrow" onclick="navigate('borrow', this)">
            <i class="fa-solid fa-hand-holding"></i>
            <span>Borrow Now</span>
        </a>

        <a data-page="reminder" onclick="navigate('reminder', this)">
            <i class="fa-solid fa-bell"></i>
            <span>Set Reminder</span>
        </a>

        <a data-page="logs" onclick="navigate('logs', this)">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>Activity Logs</span>
        </a>
    </aside>

    <!-- CONTENT -->
    <main class="content">
        <div id="appContent"></div>
    </main>

    <script src="/app.js"></script>
</body>

</html>
