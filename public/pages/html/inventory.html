<section class="page">
    <!-- ADD ITEM -->
    <div class="form inventory">
        <input type="text" id="itemName" placeholder="Item name...">
        <input type="number" id="itemQty" placeholder="Quantity..." min="1">
        <button class="addItem" onclick="addItem()">Add Item</button>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Reg-Quantity</th>
                    <th>Stock</th>
                    <th>Added By</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="itemsTable"></tbody>
        </table>
    </div>
</section>
