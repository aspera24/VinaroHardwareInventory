<section class="page">
    <div>
        <h3 class="pageTitle">LIST OF ALL ITEMS</h3>
        <p class="pageSub">View, manage, and track all available items in the inventory system</p>
    </div>
    <!-- ADD ITEM -->
    <div class="form inventory">
        <button class="addItem" onclick="openItemModal()"><i class="fa-solid fa-plus"></i> ADD ITEM</button>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">ADD ITEM</h3>
            <label for="itemName">Item Name</label>
            <input type="text" id="itemName" required>
            <label for="itemQty">Quantity</label>
            <input type="number" id="itemQty" required>
            <label for="itemPrice">Price (Optional)</label>
            <input type="number" id="itemPrice">

            <div class="modal-actions">
                <button onclick="saveItem()">Save</button>
                <button onclick="closeItemModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table id="itemsTableUI">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Stock</th>
                    <th>Price</th>
                    <th>Added by</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="itemsTable"></tbody>
        </table>
    </div>
</section>
