<section class="page">
    <h3 class="pageTitle">LISTA SA TANANG ITEMS</h3>
    <!-- ADD ITEM -->
    <div class="form inventory">
        <button class="addItem" onclick="openItemModal()">PUNO UG ITEM</button>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">PUNO UG ITEM</h3>
            <label for="itemName">Pangalan sa item</label>
            <input type="text" id="itemName" required>
            <label for="itemQty">Gidaghanon</label>
            <input type="number" id="itemQty" required>
            <label for="itemPrice">Presyo (Optional ra)</label>
            <input type="number" id="itemPrice">

            <div class="modal-actions">
                <button onclick="saveItem()">Save</button>
                <button onclick="closeItemModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table id="itemsTableUI">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Item</th>
                    <th>Gidaghanon</th>
                    <th>Nahabilin</th>
                    <th>Presyo</th>
                    <th>Added by</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="itemsTable"></tbody>
        </table>
    </div>
</section>
