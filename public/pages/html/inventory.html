<section class="page">
    <div>
        <h3 class="pageTitle">LIST OF ALL ITEMS</h3>
        <p class="pageSub">View, manage, and track all available items in the inventory system</p>
    </div>
    <!-- ADD ITEM -->
    <div class="form inventory">
        <button class="addItem" onclick="openItemModal()"><i class="fa-solid fa-plus"></i> ADD ITEM</button>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">

            <h3 id="modalTitle">
                <i class="fa-solid fa-box"></i>
                ADD ITEM
            </h3>

            <label>
                <i class="fa-solid fa-tag"></i> Item Name
            </label>
            <input type="text" id="itemName" required>

            <label>
                <i class="fa-solid fa-layer-group"></i> Quantity
            </label>
            <input type="number" id="itemQty" required>

            <label>
                <i class="fa-solid fa-peso-sign"></i> Price (Optional)
            </label>
            <input type="number" id="itemPrice">

            <div class="modal-actions">

                <button onclick="saveItem()" id="saveItemBtn" class="save">
                    <i class="fa-solid fa-floppy-disk" id="saveItemIcon"></i>
                    Save Item
                </button>

                <button onclick="closeItemModal()" class="cancel">
                    <i class="fa-solid fa-xmark"></i>
                    Cancel
                </button>

            </div>

        </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table id="itemsTableUI">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Stock</th>
                    <th>Price</th>
                    <th>Added by</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="itemsTable"></tbody>
        </table>
    </div>
</section>
