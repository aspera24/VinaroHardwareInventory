<section class="page">
    <h3 class="pageTitle">LIST OF ALL ITEMS</h3>
    <!-- ADD ITEM -->
    <div class="form inventory">
        <button class="addItem" onclick="openItemModal()">ADD ITEM</button>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">ADD ITEM</h3>
            <label for="itemName">Item Name</label>
            <input type="text" id="itemName" required>
            <label for="itemQty">Quantity</label>
            <input type="number" id="itemQty" required>
            <label for="itemPrice">Price</label>
            <input type="number" id="itemPrice" required>

            <div class="modal-actions">
                <button onclick="saveItem()">Save</button>
                <button onclick="closeItemModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table id="itemsTableUI">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Item</th>
                    <th>Reg-Quantity</th>
                    <th>Stock</th>
                    <th>Price</th>
                    <th>Added By</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="itemsTable"></tbody>
        </table>
    </div>
</section>
