<section class="page reminderPage">

    <div class="pageHeader">
        <div>
            <h3 class="pageTitle">LIST OF ALL REMINDERS</h3>
            <p class="pageSub">View and manage all system reminders and notifications</p>
        </div>

        <button onclick="openReminderModal()">
            ADD REMINDER
        </button>
    </div>

    <div class="reminderFilters">

        <div class="reminderTabs">
            <button class="reminderTab" onclick="setFilter('all')" data-filter="all">All</button>
            <button class="reminderTab" onclick="setFilter('today')" data-filter="today">Today</button>
            <button class="reminderTab" onclick="setFilter('weekly')" data-filter="weekly">Weekly</button>
            <button class="reminderTab" onclick="setFilter('monthly')" data-filter="monthly">Monthly</button>
            <button class="reminderTab" onclick="setFilter('overdue')" data-filter="overdue">Overdue</button>
            <button class="reminderTab" onclick="setFilter('completed')" data-filter="completed">Completed</button>
        </div>

        <!-- <input type="search" placeholder="Search reminder..."> -->

    </div>

    <!-- REMINDER LIST -->
    <div class="reminderCont">
        <h3>Reminders</h3>
        <div id="reminderList" class="reminderList"></div>
    </div>

</section>

<!-- REMINDER MODAL -->
<div id="reminderModal" class="modal">

    <div class="reminderModalContent">

        <div class="modalTop">
            <h3 class="pageTitle">ADD REMINDER</h3>

            <button onclick="closeReminderModal()">
                ✕
            </button>
        </div>

        <div class="modalBody">

            <!-- TITLE -->
            <div class="inputGroup">
                <label>Reminder Title</label>

                <input type="text" id="rTitle" placeholder="Enter reminder title">
            </div>

            <!-- DESCRIPTION -->
            <div class="inputGroup">
                <label>Description</label>

                <textarea id="rDescription" placeholder="Enter description">
                </textarea>
            </div>

            <!-- TYPE -->
            <div class="inputGroup">
                <label>Reminder Type</label>

                <select id="rType" onchange="handleReminderType()">

                    <option value="one_time">
                        One Time
                    </option>

                    <option value="daily">
                        Daily
                    </option>

                    <option value="weekly">
                        Weekly
                    </option>

                    <option value="monthly">
                        Monthly
                    </option>

                    <option value="date_range">
                        Date Range
                    </option>

                </select>
            </div>

            <!-- DATE -->
            <div class="inputGroup" id="singleDateGroup">

                <label>Date</label>

                <input type="date" id="rStartDate">
            </div>

            <!-- DATE RANGE -->
            <div class="dateRangeWrap" id="dateRangeGroup" style="display:none;">

                <div class="inputGroup">
                    <label>Start Date</label>
                    <input type="date" id="rRangeStart">
                </div>

                <div class="inputGroup">
                    <label>End Date</label>
                    <input type="date" id="rRangeEnd">
                </div>

            </div>

            <!-- TIME -->
            <div class="inputGroup">
                <label>Reminder Time</label>

                <input type="time" id="rTime">
            </div>

            <!-- WEEK DAY -->
            <div class="inputGroup" id="weekDayGroup" style="display:none;">

                <label>Week Day</label>

                <select id="rWeekDay">

                    <option value="">
                        Select Week Day
                    </option>

                    <option value="Sunday">Sunday</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>

                </select>
            </div>

            <!-- MONTH DAY -->
            <div class="inputGroup" id="monthDayGroup" style="display:none;">

                <label>Day of Month</label>

                <input type="number" id="rMonthDay" min="1" max="31" placeholder="Example: 15">
            </div>

            <!-- BUTTON -->
            <button onclick="saveReminder()">
                Save Reminder
            </button>

        </div>

    </div>

</div>
