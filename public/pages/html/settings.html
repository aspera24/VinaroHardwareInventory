<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div id="loading">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <div class="mainSettings">
    <h2 class="title">Settings</h2>
    <p class="title-p">Change account, System Security, Notification, Appearance.</p>
    <div class="settings-container">
      <!-- LEFT -->
      <div class="settings-menu">

        <ul>
          <li class="active">Modify Account</li>
          <li>Security</li>
          <li>Notifications</li>
          <li>Appearance</li>
        </ul>
      </div>

      <!-- RIGHT -->
      <div class="settings-content">

        <div class="section-title">Account Settings</div>

        <div class="card">
          <h3>Profile Information</h3>

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe">
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@email.com">
          </div>

          <button class="save-btn">Save Changes</button>
        </div>

        <div class="card">
          <h3>Change Password</h3>

          <div class="form-group">
            <label>Current Password</label>
            <input type="password">
          </div>

          <div class="form-group">
            <label>New Password</label>
            <input type="password">
          </div>

          <button class="save-btn">Update Password</button>
        </div>

        <div class="card">
          <h3>Notifications</h3>

          <div class="toggle">
            <span>Email Notifications</span>
            <div class="switch" onclick="this.classList.toggle('active')"></div>
          </div>

          <div class="toggle">
            <span>SMS Alerts</span>
            <div class="switch active" onclick="this.classList.toggle('active')"></div>
          </div>

        </div>

      </div>

    </div>
  </div>
</body>

</html>
