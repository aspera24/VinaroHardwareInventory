<!DOCTYPE html>
<html lang="en">

<body>
    <!-- GLOBAL LOADING -->
    <div id="dashboard-loading">
        <div class="loader"></div>
        <p>Loading...</p>
    </div>
    
    <div class="dashboard-wrapper">
        <h2 class="title">Dashboard Overview</h2>
        <p class="title-p">Track appointments, customer statistics, and recent activities.</p>


        <!-- Stats Cards -->
        <div class="stats-grid">

            <div class="stat-card total-customer">
                <div class="icon">👤</div>
                <div>
                    <h3>Total Customers</h3>
                    <p id="total-customers"></p>
                </div>
            </div>

            <div class="stat-card total-appointments">
                <div class="icon">📅</div>
                <div>
                    <h3>Total Appointments</h3>
                    <p id="total-appointments"></p>
                </div>
            </div>

            <div class="stat-card upcoming-today">
                <div class="icon">⏰</div>
                <div>
                    <h3>Upcoming Today</h3>
                    <p id="upcoming-today"></p>
                </div>
            </div>

            <div class="stat-card pending-approval">
                <div class="icon">⛔</div>
                <div>
                    <h3>Pending Approvals</h3>
                    <p id="pending-appointments"></p>
                </div>
            </div>

        </div>

        <!-- Chart -->
        <div class="chart-container">
            <h3>Appointments This Week</h3>
            <div class="chart-filters">
                <p>Filters:</p>
                <select id="yearFilter"></select>
                <select id="monthFilter"></select>
                <select id="weekFilter"></select>
            </div>

            <canvas id="appointmentsChart"></canvas>

        </div>


        <!-- Recent Appointments -->
        <div class="recent-activity">
            <h3>Recent Transactions</h3>
            <div class="limit">
                <p>Select Limit:</p>
                <select id="pageLimit">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                </select>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recent-appointments">
                    <!-- dynamic data from DB -->
                </tbody>
            </table>
            <div class="pagination-controls">
                <button id="prevPage">Prev</button>
                <span id="pageInfo">Page 1</span>
                <button id="nextPage">Next</button>
            </div>
        </div>

        <div id="modal" class="modal" style="display:none">
            <div class="modal-content">
                <span id="close-modal">&times;</span>
                <h3 id="txtLabel"></h3>
                <input type="text" id="modal-search" placeholder="Search name..." />

                <select id="modal-status-filter" style="display:none">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="completed">Completed</option>
                </select>

                <div class="limitCont">
                    <select id="modal-limit">
                        <option value="5">5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                    <p>Entries</p>
                </div>

                <div id="modal-body"></div>

                <div id="modal-pagination">
                    <button id="modal-prev">Prev</button>
                    <span id="modal-page-info">Page 1</span>
                    <button id="modal-next">Next</button>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
