<section class="page">
  <h3>Dashboard Overview</h3>
  <div class="cards">
    <div class="card blue">
      <div class="cardLabel">
        <i class="fas fa-box"></i>
        <h3>Total Item(s)</h3>
      </div>
      <p id="total"></p>
    </div>

    <div class="card orange">
      <div class="cardLabel">
        <i class="fas fa-check-circle"></i>
        <h3>Available Stock</h3>
      </div>
      <p id="available"></p>
    </div>

    <div class="card light">
      <div class="cardLabel">
        <i class="fas fa-hand-holding"></i>
        <h3>Borrowed Item(s)</h3>
      </div>
      <p id="borrowed"></p>
    </div>
  </div>

  <div class="centView">
    <div class="alerts-container">
      <h3>Alerts</h3>
      <div id="alerts"></div>
    </div>

    <div class="reminder-container">
      <h3>Reminders</h3>
      <div id="reminderList"></div>
    </div>

    <div class="borrower-container">
      <button title="Add Borrower" id="addBtn">+</button>
      <div class="topborrower">
        <h3>Borrowers</h3>
        <div class="searchCont" id="searchCont">
          <img title="Search Borrower" src="/graphics/search.svg" id="searchBtn" alt="search">
          <input id="searchInput" type="search" name="" id="">
        </div>
      </div>

      <div id="borrower-list"></div>
      <div id="borrower-actions" style="display:none;">
        <button onclick="modifySelected()">Modify</button>
        <button onclick="deleteSelected()">Delete</button>
      </div>
    </div>

    <!-- MODAL -->
    <div id="borrowerModal" class="modal">
      <div class="modalContent">
        <h3 id="modalTitle">Add Borrower</h3>

        <!-- PROFILE BOX -->
        <div class="profileBox" onclick="triggerFile()">
          <img id="profilePreview" src="/graphics/default_profile.png" />

          <div class="overlay">
            <span>Change Profile</span>
          </div>
        </div>

        <!-- HIDDEN FILE INPUT -->
        <input type="file" id="bProfile" hidden>

        <input type="text" id="bName" placeholder="Name">
        <input type="text" id="bContact" placeholder="Contact">

        <button onclick="saveBorrower()">Save</button>
        <button onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="table-container">
    <h3>Returned Items</h3>
    <table id="logsTableUI">
      <thead>
        <tr>
          <th>#</th>
          <th>Item</th>
          <th>Borrower</th>
          <th>Date Borrowed</th>
          <th>Date Returned</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="logsTable"></tbody>
    </table>
  </div>
</section>
