<div class="cards">
  <div class="card blue">
    <h3>Total Items</h3>
    <p id="total"></p>
  </div>

  <div class="card orange">
    <h3>Available</h3>
    <p id="available"></p>
  </div>

  <div class="card light">
    <h3>Borrowed</h3>
    <p id="borrowed"></p>
  </div>
</div>

<div class="centView">
  <div class="alerts-container">
    <h3>Alerts</h3>
    <div id="alerts"></div>
  </div>

  <div class="borrower-container">
    <button id="addBtn">+</button>
    <h3>Borrower(s)</h3>
    <div id="borrower-list"></div>
  </div>
</div>

<div class="table-container">
  <h3>Recent Activities</h3>
  <table id="logsTableUI">
    <thead>
      <tr>
        <th>Item</th>
        <th>Borrower</th>
        <th>Date Borrowed</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="logsTable"></tbody>
  </table>
</div>
