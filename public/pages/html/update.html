<div class="updateCont">
    <h2 class="title">Update</h2>
    <p class="title-p">Update client's transaction.</p>

    <div class="centView">
        <button id="backBtn">Back</button>

        <div class="who">
            <h3 id="name"></h3>
            <p class="nameLabel">Name of Client</p>
        </div>
        <form id="updateForm">
            <input type="text" id="contact" placeholder="Contact Number" maxlength="11" required />
            <select type="text" id="purpose" required>
                <option value="">Select</option>
                <option value="personal">Personal</option>
                <option value="business">Business</option>
                <option value="emergency">Emergency</option>
                <option value="tuition">Tuition</option>
                <option value="other">Other</option>
            </select>
            <input type="date" id="date" required />
            <input type="time" id="time" required />

            <select id="status">
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="completed">Completed</option>
            </select>

            <textarea id="note" placeholder="Note"></textarea>

            <button type="submit">Update</button>
        </form>

        
    </div>
</div>
