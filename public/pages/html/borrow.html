<section class="page">
    <h3 class="borrowLabel pageTitle">LIST OF BORROWED ITEMS</h3>
    <div class="form borrow">
        <div class="borrowerName">
            <input type="text" id="borrower" placeholder="Borrower name...">
            <div id="suggestBox" class="suggest-box"></div>
        </div>
        <select id="itemSelect"></select>
        <input type="number" id="borrowQty" placeholder="Quantity..." min="1">
        <button class="borrowBtn" onclick="borrowItem()">BORROW</button>
    </div>

    <!-- MODAL -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">MODIFY DETAILS</h3>
            <div class="modalBorrowerName">
                <input type="text" id="modalBorrower">
                <div id="modalSuggestBox" class="suggest-box"></div>
            </div>
            <select id="modalItemSelect"></select>
            <input type="number" id="modalQty">
            <input type="datetime-local" id="modalDate">
            <div class="modal-actions">
                <button onclick="saveItem()">Save</button>
                <button onclick="closeItemModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table id="borrowTableUI">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Item</th>
                    <th>Borrower</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="borrowTable"></tbody>
        </table>
    </div>
</section>
