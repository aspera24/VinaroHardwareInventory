<section class="page">
    <div class="form borrow">
        <div class="borrowerName">
            <input type="text" id="borrower" placeholder="Borrower name...">
            <div id="suggestBox" class="suggest-box"></div>
        </div>
        <select id="itemSelect"></select>
        <input type="number" id="borrowQty" placeholder="Quantity..." min="1">
        <button class="borrowBtn" onclick="borrowItem()">Borrow</button>
    </div>

    <div class="table-container">
        <table id="borrowTableUI">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Borrower</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="borrowTable"></tbody>
        </table>
    </div>
</section>
