<div class="main">
    <!-- GLOBAL LOADING -->
    <div id="loading">
        <div class="loader"></div>
        <p>Loading...</p>
    </div>
    <div class="card">
        <div id="left-card">
            <h2>Add Customer</h2>

            <form id="customerForm">
                <label>Customer Name:</label><br>
                <input type="text" id="name" required><br><br>

                <label>Purpose:</label><br>
                <input type="text" id="purpose" required><br><br>

                <label>Available Date:</label><br>
                <input type="date" id="date" required><br><br>

                <label>Available Time:</label><br>
                <input type="time" id="time" required><br><br>

                <button type="submit">Save Customer</button>
            </form>
        </div>
        <div id="right-card">
            <h2>Customer Profile (Optional)</h2>
        </div>
    </div>
</div>
