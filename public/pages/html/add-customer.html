<!-- GLOBAL LOADING -->
<div id="loading">
    <div class="loader"></div>
    <p>Loading...</p>
</div>

<div class="main">
    <h2 class="title">Add New Customer</h2>
    <p class="title-p">Fill in the required information to schedule a customer appointment and manage their profile.</p>

    <div class="form-card">
        <!-- LEFT CARD -->
        <div id="left-card">
            <form id="customerForm">

                <label>Full Name</label>
                <select id="name" required></select>


                <label>Contact Number</label>
                <input type="text" id="contact" maxlength="11" required>

                <label>Purpose of Loan</label>
                <select id="purpose" required>
                    <option value="">Select</option>
                    <option value="personal">Personal</option>
                    <option value="business">Business</option>
                    <option value="emergency">Emergency</option>
                    <option value="tuition">Tuition</option>
                    <option value="other">Other</option>
                </select>

                <!-- <label>Requested Amount</label>
                <input type="number" id="amount" required> -->

                <label>Available Date</label>
                <input type="date" id="date" required>

                <label>Available Time</label>
                <input type="time" id="time" required>

                <label>Mode of Meeting</label>
                <select id="meeting_mode">
                    <option value="walk-in">Walk-in</option>
                    <option value="online">Online</option>
                </select>

                <button type="submit">Save Customer</button>

            </form>
        </div>


        <!-- RIGHT CARD -->
        <div id="right-card">
            <h2>Customer Profile (Optional)</h2>

            <div class="profile-section">
                <h4>Personal Information</h4>
                <label>Address</label>
                <input type="text" id="address">

                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="profile-section">
                <h4>Customer Tracking</h4>
                <label>Customer Type</label>
                <select id="customer_type">
                    <option value="new">New</option>
                    <option value="returning">Old</option>
                </select>

                <label>Status</label>
                <select id="status">
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                </select>
            </div>

            <div class="profile-section">
                <h4>Notes</h4>
                <textarea id="notes" rows="4"></textarea>
            </div>

        </div>

    </div>

</div>
