<!-- GLOBAL LOADING -->
<div id="loading">
    <div class="loader"></div>
    <p>Loading...</p>
</div>

<div class="mainAppoint">
    <h2 class="title">Scheduled Appointments</h2>
    <p class="title-p">Monitor and manage customers with scheduled appointments.</p>

    <div class="mainCard">
        <!-- FILTER BAR -->
        <div class="table-controls">
            <select id="filterStatus">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
            </select>

            <div class="report-controls">
                <p id="customerCount">0 client</p>
                <a id="deleteAllBtn" title="Delete All" class="danger"><img src="/graphics/delete.svg"
                        alt="Delete All"></a>
                <a id="generateReport" title="Generate Report"><img src="/graphics/generate.svg"
                        alt="Generate Report"></a>
                <a id="screenshotTable" title="Screenshot"><img src="/graphics/screenshot.svg" alt="Screenshot"></a>
            </div>
        </div>

        <table id="appTable">
            <thead>
                <div class="checkCont">
                    <label for="selectAll">Check All</label>
                    <input type="checkbox" id="selectAll">
                </div>
                <tr>
                    <th>Name</th>
                    <th>Purpose</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Notes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="appointmentList"></tbody>
        </table>

        <div id="msgBox" class="msgBox">
            <div class="msgContent">
                <h3 id="msgTitle"></h3>
                <p id="msgText"></p>

                <div id="msgBtns">
                    <button id="msgOk">Confirm</button>
                    <button id="msgCancel">Close</button>
                </div>
            </div>
        </div>

        <div id="msgSuccess">
            <h3 id="successTitle"></h3>
            <p id="successText"></p>
        </div>

        <div class="tableCont">
            <p></p>
            <button id="applyBtn">Mark as Completed</button>
            <button id="deleteSelectedBtn" class="danger">Delete Selected</button>
        </div>

    </div>

</div>
