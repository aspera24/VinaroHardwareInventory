
<!-- GLOBAL LOADING -->
<div id="loading">
    <div class="loader"></div>
    <p>Loading...</p>
</div>

<div class="mainAppoint">
    <h2 class="title">Scheduled Appointments</h2>
    <p class="title-p">Monitor and manage customers with scheduled appointments.</p>

    <div class="mainCard">

        <!-- FILTER BAR -->
        <div class="table-controls">
            <select id="filterStatus">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="declined">Declined</option>
            </select>

            <button id="deleteAllBtn" class="danger">Remove All</button>
        </div>

        <!-- COUNTER -->
        <p id="customerCount">0 customer</p>

        <table id="appTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Purpose</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Notes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="appointmentList"></tbody>
        </table>
    </div>

</div>
