<!-- GLOBAL LOADING -->
<div id="loading">
    <div class="loader"></div>
    <p>Loading...</p>
</div>

<div class="mainAppoint">
    <h2 class="title">Scheduled Appointments</h2>
    <p class="title-p">Monitor and manage customers with scheduled appointments.</p>

    <div class="mainCard">


        <!-- FILTER BAR -->
        <div class="table-controls">
            <select id="filterStatus">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
            </select>

            <div class="report-controls">
                <p id="customerCount">0 client</p>
                <a id="deleteAllBtn" class="danger"><img src="../graphics/deleteAll.svg" alt="Delete All"></a>
                <a id="generateReport"><img src="../graphics/generate.svg" alt="Generate Report"></a>
                <a id="screenshotTable"><img src="../graphics/screenshot.svg" alt="Screenshot"></a>
            </div>
        </div>

        <table id="appTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Purpose</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Notes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="appointmentList"></tbody>
        </table>
    </div>

</div>
