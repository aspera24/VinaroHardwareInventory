<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title id="browserTitle"></title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/index-tab-mob.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/pages/css/dashboard.css">
    <link rel="stylesheet" href="/pages/css/dashboard-tab-mob.css">
    <link rel="stylesheet" href="/pages/css/add-customer.css">
    <link rel="stylesheet" href="/pages/css/add-customer-tab-mob.css">
    <link rel="stylesheet" href="/pages/css/appointments.css">
    <link rel="stylesheet" href="/pages/css/appointments-tab-mob.css">
    <link rel="stylesheet" href="/pages/css/settings.css">
    <link rel="stylesheet" href="/pages/css/settings-tab-mob.css">
    <link rel="stylesheet" href="/pages/css/update.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- For DataTable -->
    <link rel="stylesheet" href="//cdn.datatables.net/2.3.6/css/dataTables.dataTables.min.css">
    <script src="//cdn.datatables.net/2.3.6/js/dataTables.min.js"></script>
    
</head>

<body>

    <div class="container">
        <button id="nav-toggle">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="profileCont">
            <img src="/graphics/profile.svg" alt="">
            <p id="accName">Charmaine Mercado</p>
        </div>

        <nav id="sidebar">
            <h2>CUSTOMER SERVICE</h2>
            <ul>
                <li>
                    <a id="dashboard" href="/page/dashboard" onclick="navigate('dashboard')">
                        <i class="fa-solid fa-chart-line"></i> Dashboard
                    </a>
                </li>

                <li>
                    <a id="add_customer" href="/page/add-customer" onclick="navigate('add-customer')">
                        <i class="fa-solid fa-user-plus"></i> Add Customer
                    </a>
                </li>

                <li>
                    <a id="appointments" href="/page/appointments" onclick="navigate('appointments')">
                        <i class="fa-solid fa-calendar-check"></i> Appointments
                    </a>
                </li>

                <li class="account">
                    <a id="account" href="/page/account" onclick="navigate('account')">
                        <i class="fa-solid fa-user-circle"></i> Your Account
                    </a>
                </li>

                <li>
                    <a id="settings" href="/page/settings" onclick="navigate('settings')">
                        <i class="fa-solid fa-gear"></i> Settings
                    </a>
                </li>
            </ul>

            <input class="logout" type="button" value="Logout">
        </nav>

        <div id="main-content"></div>
    </div>

    
    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
    

</body>

</html>
